name: Build CLI

on:
  push:
    branches:
      - dev
      - master
  pull_request:
    branches:
      - dev
      - master

jobs:
  build:
    name: build-cli-binary
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build powerkit-cli binary
        run: CGO_ENABLED=1 go build -v -o powerkit-cli ./cmd/powerkit-cli
        
      - name: Verify binary was created
        run: |
          ls -l powerkit-cli
          file powerkit-cli
      
      - name: Upload powerkit-cli binary as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: powerkit-cli-macos
          path: powerkit-cli
